plugins {
    id 'java'
    id 'net.neoforged.gradle.userdev' version '7.0.171'
}

group   = 'com.unbreakingwoody'
version = '0.0.2'

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

runs {
    configureEach {
        systemProperty 'forge.logging.markers', 'REGISTRIES'
        systemProperty 'forge.logging.console.level', 'debug'
        modSource project.sourceSets.main
    }
    client { }
    server { }
}

repositories { }

dependencies {
    implementation "net.neoforged:neoforge:21.1.228"
}

jar {
    manifest {
        attributes([
            'Specification-Title'   : 'unbreakingwoody',
            'Specification-Vendor'  : 'unbreakingwoody',
            'Specification-Version' : '0.0.2',
            'Implementation-Title'  : project.name,
            'Implementation-Version': project.version,
            'Implementation-Vendor' : 'unbreakingwoody',
        ])
    }
}
